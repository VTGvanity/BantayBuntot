<!DOCTYPE html>
<html>
<head>
    <title>Authenticating... - BantayBuntot</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { color: #64748b; font-size: 18px; font-weight: 500; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 2rem; border-radius: 1rem; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal h2 { margin-top: 0; color: #1e293b; }
        .modal p { color: #64748b; margin-bottom: 2rem; line-height: 1.5; }
        .modal-buttons { display: flex; flex-direction: column; gap: 1rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: #3498db; color: white; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
    <div id="auth-status" style="text-align: center;">
        <div class="loader"></div>
        <div class="text">Completing authentication...</div>
    </div>

    <!-- Account Already Registered Modal -->
    <div id="alreadyRegisteredModal" class="modal-overlay">
        <div class="modal">
            <h2>Account Exists</h2>
            <p>This email is already registered using a password. To protect your security, please log in with your email and password instead.</p>
            <div class="modal-buttons">
                <a href="{% url 'login' %}" class="btn btn-secondary">Back to Login</a>
                <a href="{% url 'forgot_password' %}" class="btn btn-primary">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "{{ SUPABASE_URL }}";
        const SUPABASE_ANON_KEY = "{{ SUPABASE_ANON_KEY }}";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleAuth() {
            // Get role from URL if present
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role') || 'user';
            const code = urlParams.get('code');

            // 1. Wait for Supabase to process the code or fragment
            // We use a small timeout or check for session
            let session = null;
            
            try {
                const { data, error } = await supabaseClient.auth.getSession();
                if (error) throw error;
                session = data.session;
            } catch (err) {
                console.error('Initial session check error:', err);
            }

            // 2. If no session yet, it might be processing the code. 
            // We can wait a moment or listen for auth change.
            if (!session) {
                // Wait up to 5 seconds for auth state change
                session = await new Promise((resolve) => {
                    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((event, newSession) => {
                        if (newSession) {
                            subscription.unsubscribe();
                            resolve(newSession);
                        }
                    });
                    setTimeout(() => {
                        subscription.unsubscribe();
                        resolve(null);
                    }, 5000);
                });
            }

            if (session) {
                // 3. We have a session! Now notify the Django backend to log us in.
                // We'll also clear the OLD Vanity tokens ONLY NOW that we have a new one
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('sb-') && !key.includes(supabaseClient.supabaseUrl.split('.')[0].split('//')[1])) {
                        // This clears tokens for OTHER supabase projects if they exist
                        // For the current project, getSession already gave us the right one.
                    }
                }

                const response = await fetch('/api/auth/sync-session/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': '{{ csrf_token }}'
                    },
                    body: JSON.stringify({
                        access_token: session.access_token,
                        refresh_token: session.refresh_token,
                        role: role
                    })
                });

                const result = await response.json();
                if (result.success) {
                    if (result.require_verification) {
                        // Sign out of Supabase to ensure they can't access data 
                        // until they've clicked the link in their email.
                        await supabaseClient.auth.signOut();
                        window.location.href = "/verify-email/";
                    } else {
                        window.location.href = result.redirect_url || '/dashboard/';
                    }
                } else if (result.error === 'ALREADY_REGISTERED_WITH_PASSWORD') {
                    // Sign out from Supabase because we don't want this half-linked session
                    await supabaseClient.auth.signOut();
                    // Hide loader
                    document.getElementById('auth-status').style.display = 'none';
                    // Show the modal
                    document.getElementById('alreadyRegisteredModal').style.display = 'flex';
                } else {
                    window.location.href = "{% url 'login' %}?error=" + encodeURIComponent(result.error || 'Session sync failed');
                }
            } else {
                // No session found after waiting, redirect to login
                window.location.href = "{% url 'login' %}?error=Authentication timeout or failed";
            }
        }

        handleAuth();
    </script>
</body>
</html>
