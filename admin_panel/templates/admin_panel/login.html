<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | BantayBuntot</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF8C00;
            --primary-dark: #e67e00;
            --secondary: #2c3e50;
            --bg-body: #f4f7f6;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --border-radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f4f7f6 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 35px;
            color: var(--secondary);
        }

        .logo i {
            color: var(--primary);
            font-size: 32px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--secondary);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 15px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--secondary);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border-radius: 14px;
            border: 1.5px solid #eee;
            font-size: 15px;
            transition: all 0.2s;
            background: #fcfcfc;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 140, 0, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.25);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-msg {
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 25px;
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-shield-dog"></i>
            <span>BantayBuntot</span>
        </div>
        <h1>Admin Control</h1>
        <p>Sign in to your administrative account</p>

        {% if error %}
        <div class="error-msg" style="display: block;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username or Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" name="username" placeholder="Enter username" required autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Secret Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            {% if recaptcha_enabled %}
            <!-- STRIDE: DoS/SPOOFING Protection - reCAPTCHA v2 Checkbox -->
            <div class="form-group" style="display: flex; justify-content: center; margin: 15px 0;">
                <div id="recaptcha-container"></div>
            </div>
            {% endif %}
            
            <button type="submit" class="btn-login">
                Access Dashboard <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
            </button>
        </form>
        
        <div style="margin-top: 30px; font-size: 14px; color: var(--text-muted);">
            Return to <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Main Portal</a>
        </div>
    </div>
    
    {% if recaptcha_enabled %}
    <!-- STRIDE: DoS/SPOOFING Protection - Google reCAPTCHA v2 -->
    <script>
        // Global callback function for reCAPTCHA - always renders fresh
        function renderRecaptcha() {
            var container = document.getElementById('recaptcha-container');
            if (!container) return;
            
            // Check if already rendered (has iframe child)
            if (container.querySelector('iframe')) {
                return; // Already rendered, skip
            }
            
            if (typeof grecaptcha !== 'undefined' && grecaptcha.render) {
                // Render fresh widget
                grecaptcha.render('recaptcha-container', {
                    'sitekey': '{{ recaptcha_site_key }}'
                });
            }
        }
        
        // Try to render when page loads
        window.addEventListener('load', function() {
            // Small delay to let reCAPTCHA script fully load
            setTimeout(renderRecaptcha, 100);
        });
    </script>
    <script src="https://www.google.com/recaptcha/api.js?onload=renderRecaptcha&render=explicit" async defer></script>
    {% endif %}
</body>
</html>
